version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  orchestrator:
    build:
      context: ./Services/Orchestrator
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:testpass@postgres:5432/testdb
      - JWT_SECRET=test-jwt-secret-key
      - AUTH_SERVICE_URL=http://auth:5000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - auth

  auth:
    build:
      context: ./Services/Auth
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=testdb;Username=postgres;Password=testpass
      - ConnectionStrings__Redis=redis:6379
      - JWT_SECRET=test-jwt-secret-key
    ports:
      - "5000:80"
    depends_on:
      - postgres
      - redis

  llm:
    build:
      context: ./Services/LLM
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      - redis

  stt:
    build:
      context: ./Services/STT
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8002:8000"
    depends_on:
      - redis

volumes:
  postgres_data: