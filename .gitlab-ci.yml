stages:
  - lint
  - test

image: python:3.11

before_script:
  - python -m pip install --upgrade pip

# -----------------------
# LINT (TTS only for now)
# -----------------------
lint_tts:
  stage: lint
  script:
    - cd Services/TTS
    - pip install ruff
    - ruff check . || echo "lint issues (non-blocking)"

# -----------------------
# TEST (TTS only for now)
# -----------------------
test_tts:
  stage: test
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio
    - cd Services/TTS
    - pytest -q